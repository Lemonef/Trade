name: paper-bot

# Runs the paper-trading bot in GitHub's cloud every 4h. No VPS / PC needed.
on:
  schedule:
    - cron: "5 */4 * * *"     # every 4 hours (GitHub may delay a few min)
  workflow_dispatch:           # lets you run it manually from the Actions tab

permissions:
  contents: write              # allow committing state back to the repo

concurrency:
  group: paper-bot             # never run two cycles at once
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests pandas numpy yfinance markdown

      - name: Run one bot cycle
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT:  ${{ secrets.TG_CHAT }}
        run: python live_bot/paper_bot.py

      - name: Rebuild Spike-Hunter stocks page from brain ledger (best-effort)
        run: |
          AUTH="${{ secrets.BRAIN_TOKEN }}"
          if [ -n "$AUTH" ]; then URL="https://x-access-token:$AUTH@github.com/Lemonef/SecondBrain.git"; else URL="https://github.com/Lemonef/SecondBrain.git"; fi
          if git clone --depth 1 "$URL" _brain 2>/dev/null; then
            SECOND_BRAIN=_brain python web/gen_stocks.py || echo "stocks gen failed"
            SECOND_BRAIN=_brain python web/gen_scans.py  || echo "scans gen failed"
          else
            echo "brain repo not reachable (private? add BRAIN_TOKEN secret) — stocks/scans pages not rebuilt this cycle"
          fi
          rm -rf _brain

      - name: Crypto-bot heartbeat -> health.json
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          d = {}
          if Path("web/data.json").exists():
              try: d = json.loads(Path("web/data.json").read_text(encoding="utf-8"))
              except Exception: d = {}
          p = Path("web/health.json"); h = {}
          if p.exists():
              try: h = json.loads(p.read_text(encoding="utf-8"))
              except Exception: h = {}
          h["crypto_bot"] = {
              "updated": d.get("updated", "unknown"),
              "regime": d.get("regime"),
              "open_positions": len(d.get("positions", []) or []),
              "total_trades": d.get("total_trades"),
              "ok": bool(d.get("updated")),
          }
          p.write_text(json.dumps(h, indent=2), encoding="utf-8")
          print("crypto heartbeat:", h["crypto_bot"])
          PY

      - name: Persist state back to repo
        run: |
          git config user.name  "paper-bot"
          git config user.email "bot@users.noreply.github.com"
          for f in live_bot/state_*.json live_bot/equity_*.csv live_bot/trades.csv live_bot/regime_log.csv web/data.json web/stocks.html web/scans.html web/health.json; do
            [ -f "$f" ] && git add -f "$f"
          done
          git commit -m "paper-bot run $(date -u +%FT%TZ)" || echo "no changes"
          git push || echo "nothing to push"
